[build]
  publish = "."

[[redirects]]
  from = "/"
  to = "/pranit-portfolio.html"
  status = 200

[[redirects]]
  from = "/resume"
  to = "/resume.html"
  status = 200

[[redirects]]
  from = "/projects/mutthasales-enterprise-platform"
  to = "/projects/mutthasales-enterprise-platform.html"
  status = 200

[[redirects]]
  from = "/projects/drowsiness-detection-system"
  to = "/projects/drowsiness-detection-system.html"
  status = 200

[[redirects]]
  from = "/projects/food-demand-forecasting-dashboard"
  to = "/projects/food-demand-forecasting-dashboard.html"
  status = 200

[[redirects]]
  from = "/projects/internship-ml-case-studies"
  to = "/projects/internship-ml-case-studies.html"
  status = 200

[[redirects]]
  from = "/projects/smart-car-parking-system"
  to = "/projects/smart-car-parking-system.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
