<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Pranit Muttha</title>
  <meta name="description" content="Page not found. Return to Pranit Muttha's portfolio." />
  <style>
    :root { --bg:#070b16; --surface:#121a30; --text:#edf2ff; --muted:#9aabcf; --primary:#5ce1ff; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--text); }
    .card { width:min(760px,92%); background:var(--surface); border:1px solid rgba(255,255,255,.13); border-radius:18px; padding:2rem; text-align:center; }
    h1 { margin:0 0 .3rem; font-size:clamp(2.2rem,6vw,4rem); }
    p { color:var(--muted); margin:.6rem 0 1.2rem; }
    .links { display:flex; gap:.7rem; justify-content:center; flex-wrap:wrap; }
    a { text-decoration:none; border:1px solid rgba(255,255,255,.2); color:var(--text); border-radius:10px; padding:.65rem .9rem; }
    a.primary { background:linear-gradient(120deg,#5ce1ff,#9cefff); color:#051426; border:none; }
  </style>
</head>
<body>
  <main class="card">
    <h1>404</h1>
    <p>The page you’re looking for doesn’t exist or has moved.</p>
    <div class="links">
      <a class="primary" href="/">Back to Home</a>
      <a href="/pranit-portfolio.html#projects">View Projects</a>
      <a href="/pranit-portfolio.html#contact">Contact Me</a>
    </div>
  </main>
</body>
</html>
